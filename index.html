<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基礎古典学習アプリ</title>
<meta name="theme-color" content="#cdb6ff">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="基礎古典">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender:#c8b6ff; --mint:#bdf0d8; --peach:#ffd6c4;
    --pink:#ffc9e3; --sky:#bfe3ff; --cream:#fffdfb;
    --ink:#6b5b7a; --ink-dim:#a596b3;
    --ok:#4cc9a0; --ok-bg:#e3fbf2; --ng:#ff8fa3; --ng-bg:#fff0f3;
    --hot:#ff9ec4; --card:#ffffff; --shadow:rgba(168,148,196,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"M PLUS Rounded 1c","Zen Maru Gothic",sans-serif;
    background:linear-gradient(135deg,#f3e7ff 0%,#e7f0ff 35%,#e3fbf2 70%,#fff0f3 100%);
    background-attachment:fixed;
    color:var(--ink); min-height:100vh; line-height:1.85;
    font-size:18px;
  }
  .wrap{max-width:700px;margin:0 auto;padding:24px 18px 70px;}
  h1{
    font-family:"Zen Maru Gothic",sans-serif;font-weight:900;
    text-align:center;font-size:2.4rem;margin:.3em 0 .1em;
    letter-spacing:.06em;
    background:linear-gradient(90deg,#b18cff,#7ec8ff,#5fd6ad);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{text-align:center;color:var(--ink-dim);font-size:1.05rem;margin:0 0 .4em;font-weight:700;}
  .screen{display:none;animation:fade .3s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes pop{0%{transform:scale(.85);}60%{transform:scale(1.05);}100%{transform:scale(1);}}

  .panel{
    background:var(--card);border:none;
    border-radius:26px;padding:22px 20px;margin:18px 0;
    box-shadow:0 10px 28px var(--shadow);
  }
  .panel h2{margin:.1em 0 .7em;font-size:1.45rem;font-weight:800;color:var(--ink);}

  .themes{display:flex;flex-direction:column;gap:11px;margin:10px 0;}
  .theme-opt{
    display:flex;align-items:center;gap:13px;padding:14px 16px;
    border:2px solid #f0e9fa;border-radius:18px;cursor:pointer;
    font-size:1.2rem;font-weight:700;transition:all .18s;background:#fbf8ff;
  }
  .theme-opt:hover{background:#f3ecff;transform:translateY(-1px);}
  .theme-opt input{width:26px;height:26px;accent-color:var(--lavender);}
  .theme-opt .count{margin-left:auto;color:var(--ink-dim);font-size:.95rem;font-weight:700;}
  .theme-opt.all{border-color:var(--lavender);background:linear-gradient(100deg,#f3ecff,#eafaff);}

  button.btn{
    display:block;width:100%;padding:20px;margin:14px 0;
    font-size:1.35rem;font-weight:800;letter-spacing:.03em;
    color:#fff;border:none;border-radius:22px;cursor:pointer;
    box-shadow:0 8px 20px var(--shadow);
    transition:transform .12s ease,box-shadow .12s ease;
  }
  button.btn:active{transform:scale(.95);box-shadow:0 4px 12px var(--shadow);}
  button.btn.primary{background:linear-gradient(120deg,#7ee8b8,#5fd6ad);}
  button.btn.amber{background:linear-gradient(120deg,#ffd0a8,#ffb9d1);}
  button.btn.ghost{
    background:#fff;color:var(--ink);font-size:1.12rem;padding:15px;
    border:2px solid #efe6fa;box-shadow:0 4px 12px var(--shadow);
  }
  button.btn:hover{transform:translateY(-2px);}

  .row{display:flex;gap:10px;}
  .row .btn{flex:1;}

  .badge{
    display:inline-block;font-size:.95rem;font-weight:800;padding:5px 16px;border-radius:20px;
    background:linear-gradient(120deg,#e6dbff,#d8ecff);color:#7a68a0;margin-bottom:12px;
  }
  .hot{background:linear-gradient(120deg,#ffd6e8,#ffc9c0);color:#d36a96;}

  .card-title{font-family:"Zen Maru Gothic",sans-serif;font-size:1.85rem;font-weight:900;margin:.2em 0 .5em;color:#7a68a0;}
  .card-body{font-size:1.3rem;}

  .qmeta{display:flex;justify-content:space-between;align-items:center;color:var(--ink-dim);font-size:1rem;font-weight:700;margin-bottom:6px;}
  .qtext{font-size:1.4rem;font-weight:700;white-space:pre-wrap;margin:.3em 0 1.1em;}

  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    width:100%;padding:18px 20px;font-size:1.3rem;font-weight:800;font-family:inherit;
    text-align:left;color:var(--ink);background:#fbf8ff;cursor:pointer;
    border:2px solid #ece2fb;border-radius:18px;
    box-shadow:0 4px 12px var(--shadow);transition:transform .12s,background .15s;
  }
  .choice:hover:not(:disabled){background:#f3ecff;transform:translateY(-2px);}
  .choice:active:not(:disabled){transform:scale(.96);}
  .choice:disabled{cursor:default;opacity:1;}
  .choice.is-correct{background:var(--ok-bg);border-color:var(--ok);color:#2fa985;}
  .choice.is-correct::before{content:"✅ ";}
  .choice.is-wrong{background:var(--ng-bg);border-color:var(--ng);color:#e06b86;}
  .choice.is-wrong::before{content:"❌ ";}

  .result{padding:18px;border-radius:18px;margin:16px 0 0;font-size:1.35rem;font-weight:800;display:none;}
  .result.show{display:block;animation:pop .35s ease;}
  .result.ok{background:var(--ok-bg);color:#2fa985;}
  .result.ng{background:var(--ng-bg);color:#e06b86;}
  .result .ic{font-size:1.7rem;margin-right:6px;}
  .correct-ans{margin-top:10px;font-size:1.3rem;color:#7a68a0;}

  .progress{height:12px;background:#ece3fa;border-radius:10px;overflow:hidden;margin:8px 0 4px;}
  .progress > i{display:block;height:100%;width:0;border-radius:10px;
    background:linear-gradient(90deg,#c8b6ff,#7ec8ff,#5fd6ad);transition:width .35s;}
  .score{text-align:center;color:var(--ink-dim);font-size:1.05rem;font-weight:700;}

  .nav{display:flex;gap:8px;margin-top:14px;}
  .nav .btn{flex:1;margin:0;padding:14px;font-size:1.08rem;}
  .empty{text-align:center;color:var(--ink-dim);padding:20px 10px;}
  .err{color:var(--ng);text-align:center;padding:20px;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <h1>基礎古典学習アプリ</h1>
  <p class="sub">知識カード ＆ 一問一答</p>

  <!-- ホーム -->
  <section id="home" class="screen active">
    <div class="panel">
      <h2>テーマを選ぶ</h2>
      <div id="themeList" class="themes"></div>
    </div>
    <button class="btn amber" onclick="startCards()">① 今日の知識を読む</button>
    <button class="btn primary" onclick="startQuiz()">② 問題に答える</button>
    <p id="homeErr" class="err"></p>
  </section>

  <!-- 知識カード -->
  <section id="cards" class="screen">
    <div class="panel">
      <span id="cardBadge" class="badge">テーマ</span>
      <div id="cardTitle" class="card-title"></div>
      <div id="cardBody" class="card-body"></div>
    </div>
    <button class="btn amber" onclick="nextCard()">もう1枚</button>
    <button class="btn ghost" onclick="show('home')">ホームに戻る</button>
  </section>

  <!-- 問題 -->
  <section id="quiz" class="screen">
    <div class="progress"><i id="bar"></i></div>
    <p class="score"><span id="scoreNow">0</span>問目 / 全<span id="scoreTotal">0</span>問　正解 <span id="scoreOk">0</span></p>
    <div class="panel">
      <div class="qmeta">
        <span id="qBadge" class="badge">テーマ</span>
        <span id="qNum"></span>
      </div>
      <div id="qText" class="qtext"></div>
      <div id="choices" class="choices"></div>
      <div id="result" class="result"></div>
    </div>
    <div class="nav">
      <button class="btn ghost" onclick="prevQ()">← 前の問題</button>
      <button class="btn ghost" onclick="nextQ()">次の問題 →</button>
    </div>
    <button class="btn ghost" onclick="quitQuiz()">やめる（ホームに戻る）</button>
    <div id="quizEnd" class="empty" style="display:none;"></div>
  </section>
</div>

<script src="data.js"></script>
<script>
let KNOWLEDGE=[], QUIZ=[];
let selectedThemes=new Set();
let cardPool=[], lastCard=null;
let quizList=[], qIndex=0, answered=[], okCount=0;

// ---- データ読み込み（fetch → 失敗時 data.js フォールバック）----
async function loadData(){
  try{
    const [k,q]=await Promise.all([
      fetch('knowledge.json').then(r=>{if(!r.ok)throw 0;return r.json();}),
      fetch('quiz.json').then(r=>{if(!r.ok)throw 0;return r.json();})
    ]);
    KNOWLEDGE=k; QUIZ=q;
  }catch(e){
    if(window.KNOWLEDGE_DATA){KNOWLEDGE=window.KNOWLEDGE_DATA;QUIZ=window.QUIZ_DATA;}
    else{document.getElementById('homeErr').textContent='データの読み込みに失敗しました。data.js を確認してください。';return;}
  }
  buildThemeList();
}

function buildThemeList(){
  const counts={};
  KNOWLEDGE.forEach(c=>counts[c.theme]=(counts[c.theme]||0)+1);
  const themes=Object.keys(counts).sort();
  const list=document.getElementById('themeList');
  let html=`<label class="theme-opt all"><input type="checkbox" id="th-all" checked onchange="toggleAll(this)"><span>すべて</span><span class="count">${KNOWLEDGE.length}件</span></label>`;
  themes.forEach(t=>{
    html+=`<label class="theme-opt"><input type="checkbox" class="th" value="${t}" checked onchange="onThemeChange()"><span>${t}</span><span class="count">${counts[t]}件</span></label>`;
  });
  list.innerHTML=html;
}
function toggleAll(box){
  document.querySelectorAll('.th').forEach(c=>c.checked=box.checked);
}
function onThemeChange(){
  const all=[...document.querySelectorAll('.th')];
  document.getElementById('th-all').checked=all.every(c=>c.checked);
}
function getSelectedThemes(){
  const checked=[...document.querySelectorAll('.th:checked')].map(c=>c.value);
  return new Set(checked);
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ---- 知識カード ----
function startCards(){
  const th=getSelectedThemes();
  if(th.size===0){alert('テーマを1つ以上選んでください。');return;}
  cardPool=KNOWLEDGE.filter(c=>th.has(c.theme));
  if(cardPool.length===0){alert('該当する知識カードがありません。');return;}
  lastCard=null;
  show('cards');
  nextCard();
}
function nextCard(){
  let pick;
  if(cardPool.length===1){pick=cardPool[0];}
  else{do{pick=cardPool[Math.floor(Math.random()*cardPool.length)];}while(pick===lastCard);}
  lastCard=pick;
  const b=document.getElementById('cardBadge');
  b.textContent=pick.theme+(pick.hot?'　🌟頻出':'');
  b.className='badge'+(pick.hot?' hot':'');
  document.getElementById('cardTitle').textContent=pick.title;
  document.getElementById('cardBody').textContent=pick.summary;
}

// ---- 問題（選択式）----
function startQuiz(){
  const th=getSelectedThemes();
  if(th.size===0){alert('テーマを1つ以上選んでください。');return;}
  quizList=shuffle(QUIZ.filter(q=>th.has(q.theme)).slice());
  if(quizList.length===0){alert('該当する問題がありません。');return;}
  qIndex=0;okCount=0;
  answered=new Array(quizList.length).fill(null); // {picked, correct}
  document.getElementById('scoreTotal').textContent=quizList.length;
  document.getElementById('quizEnd').style.display='none';
  show('quiz');
  renderQ();
}
function renderQ(){
  const q=quizList[qIndex];
  document.getElementById('bar').style.width=((qIndex)/quizList.length*100)+'%';
  document.getElementById('scoreNow').textContent=qIndex+1;
  document.getElementById('scoreOk').textContent=okCount;
  const b=document.getElementById('qBadge');
  b.textContent=q.theme+(q.hot?'　🌟頻出':'');
  b.className='badge'+(q.hot?' hot':'');
  document.getElementById('qNum').textContent=`第${qIndex+1}問 / ${quizList.length}`;
  document.getElementById('qText').textContent=q.question;
  const box=document.getElementById('choices');
  const res=document.getElementById('result');
  const prev=answered[qIndex];
  box.innerHTML='';
  q.choices.forEach(choice=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=choice;
    if(prev){
      btn.disabled=true;
      if(choice===q.answer)btn.classList.add('is-correct');
      else if(choice===prev.picked)btn.classList.add('is-wrong');
    }else{
      btn.onclick=()=>pickChoice(choice);
    }
    box.appendChild(btn);
  });
  if(prev){showResult(prev.correct,q.answer);}
  else{res.className='result';res.innerHTML='';}
}
function pickChoice(choice){
  if(answered[qIndex])return;
  const q=quizList[qIndex];
  const correct=(choice===q.answer);
  if(correct)okCount++;
  answered[qIndex]={picked:choice,correct};
  document.getElementById('scoreOk').textContent=okCount;
  showResult(correct,q.answer);
  document.getElementById('bar').style.width=((qIndex+1)/quizList.length*100)+'%';
  // ボタンの色付け・無効化
  [...document.querySelectorAll('#choices .choice')].forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer)b.classList.add('is-correct');
    else if(b.textContent===choice)b.classList.add('is-wrong');
  });
}
function showResult(correct,answer){
  const res=document.getElementById('result');
  res.className='result show '+(correct?'ok':'ng');
  const okMsg=[['✨','正解！'],['🎉','せいかい！'],['💮','だいせいかい！'],['🌸','やったね！']];
  const m=okMsg[Math.floor(Math.random()*okMsg.length)];
  res.innerHTML = correct
    ? '<span class="ic">'+m[0]+'</span>'+m[1]
    : '<span class="ic">😢</span>おしい！<div class="correct-ans">正解：'+answer+'</div>';
}
function nextQ(){
  if(qIndex<quizList.length-1){qIndex++;renderQ();}
  else{finishQuiz();}
}
function prevQ(){
  if(qIndex>0){qIndex--;renderQ();}
}
function finishQuiz(){
  const end=document.getElementById('quizEnd');
  end.style.display='block';
  const pct=Math.round(okCount/quizList.length*100);
  const face=pct>=80?'🎉':pct>=50?'😊':'🌱';
  end.innerHTML=`<div class="panel"><h2>${face} おつかれさま！</h2>`
    +`<p style="font-size:1.3rem;font-weight:800;">全${quizList.length}問中　<b style="color:var(--ok);">${okCount}問</b> 正解</p>`
    +`<p style="font-weight:700;">正答率 ${pct}% ${pct>=80?'✨すごい！':pct>=50?'👍この調子！':'💪つぎはがんばろう！'}</p></div>`;
  document.getElementById('bar').style.width='100%';
}
function quitQuiz(){show('home');}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('quiz').classList.contains('active'))return;
  if(e.key==='Enter'&&answered[qIndex])nextQ();
});

loadData();
</script>
</body>
</html>
