<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cdb6ff"/>
      <stop offset="0.5" stop-color="#bfe0ff"/>
      <stop offset="1" stop-color="#bff0d8"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff4fb"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7a5ea8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景（全面・iOSは自動で角丸マスク） -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 背後のやわらかい白円 -->
  <circle cx="256" cy="270" r="170" fill="#ffffff" opacity="0.35"/>

  <!-- 本（見開き） -->
  <g filter="url(#soft)">
    <!-- 左ページ -->
    <path d="M256 196
             C214 168 168 162 120 170
             C112 171 106 178 106 186
             L106 356
             C106 365 113 372 122 371
             C166 365 216 372 256 396 Z" fill="url(#page)"/>
    <!-- 右ページ -->
    <path d="M256 196
             C298 168 344 162 392 170
             C400 171 406 178 406 186
             L406 356
             C406 365 399 372 390 371
             C346 365 296 372 256 396 Z" fill="url(#page)"/>
    <!-- 背（中央） -->
    <rect x="250" y="196" width="12" height="200" rx="6" fill="#e9def7"/>
    <!-- ページの罫線（左） -->
    <g stroke="#d9c9ef" stroke-width="7" stroke-linecap="round">
      <line x1="146" y1="212" x2="232" y2="222"/>
      <line x1="142" y1="244" x2="232" y2="252"/>
      <line x1="142" y1="276" x2="232" y2="282"/>
      <line x1="142" y1="308" x2="232" y2="312"/>
    </g>
    <!-- ページの罫線（右） -->
    <g stroke="#d9c9ef" stroke-width="7" stroke-linecap="round">
      <line x1="280" y1="222" x2="366" y2="212"/>
      <line x1="280" y1="252" x2="370" y2="244"/>
      <line x1="280" y1="282" x2="370" y2="276"/>
      <line x1="280" y1="312" x2="370" y2="308"/>
    </g>
  </g>

  <!-- 桜の花（右上） -->
  <g transform="translate(372,150)" filter="url(#soft)">
    <g fill="#ff9ec4">
      <g id="petal">
        <path d="M0 -34 C13 -34 20 -20 14 -7 C11 -1 -11 -1 -14 -7 C-20 -20 -13 -34 0 -34 Z"/>
      </g>
      <use href="#petal" transform="rotate(72)"/>
      <use href="#petal" transform="rotate(144)"/>
      <use href="#petal" transform="rotate(216)"/>
      <use href="#petal" transform="rotate(288)"/>
    </g>
    <circle r="9" fill="#fff2b0"/>
  </g>

  <!-- きらきら -->
  <g fill="#ffffff">
    <path d="M150 150 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 Z" opacity="0.9"/>
    <circle cx="120" cy="320" r="6" opacity="0.8"/>
    <circle cx="408" cy="330" r="7" opacity="0.85"/>
  </g>
</svg>
